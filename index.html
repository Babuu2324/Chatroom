<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 VANAVAS </title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); width: 100%; max-width: 400px; text-align: center; margin: 15px; }
        h2 { margin-bottom: 20px; color: #00adb5; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #333; border-radius: 8px; background: #2d2d2d; color: #fff; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #00adb5; border: none; color: #fff; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #00818a; }
        
        /* Chat Room Styling */
        #chat-room { display: none; width: 100%; max-width: 500px; height: 90vh; background: #1e1e1e; flex-direction: column; border-radius: 12px; overflow: hidden; margin: 10px; }
        .chat-header { background: #252d32; padding: 15px; text-align: left; font-weight: bold; color: #00adb5; border-bottom: 1px solid #333; }
        .message-box { flex: 1; padding: 15px; overflow-y: auto; background: #131c21; display: flex; flex-direction: column; }
        .chat-input-area { display: flex; padding: 10px; background: #1e1e1e; border-top: 1px solid #333; }
        .chat-input-area input { flex: 1; margin: 0 10px 0 0; }
        .chat-input-area button { width: auto; padding: 0 20px; margin: 0; }
        
        /* Message Bubbles */
        .msg { padding: 8px 12px; margin: 5px 0; border-radius: 8px; max-width: 75%; word-wrap: break-word; }
        .msg.me { background: #056162; align-self: flex-end; color: #fff; }
        .msg.other { background: #262d31; align-self: flex-start; color: #fff; }
        .msg-sender { font-size: 12px; color: #00adb5; margin-bottom: 3px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- १. लॉगिन स्क्रीन -->
    <div id="login-screen" class="container">
        <h2>Secret Chat Room 🔒</h2>
        <input type="text" id="username" placeholder="तुमचे नाव (Username)" required>
        <input type="password" id="password" placeholder="गुपित पासवर्ड (Password)" required>
        <button id="login-btn">प्रवेश करा</button>
    </div>

    <!-- २. चॅट स्क्रीन -->
    <div id="chat-room">
        <div class="chat-header">🔒 गुपित चॅट रूम (<span id="user-display"></span>)</div>
        <div class="message-box" id="messages"></div>
        <div class="chat-input-area">
            <input type="text" id="msg-text" placeholder="मेसेज टाईप करा...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // तुमचा Firebase कॉन्फिगरेशन कोड
        const firebaseConfig = {
            apiKey: "AIzaSyCm_f8cJSc9vQC9RMjC-w6dI1nGGtQbXFM",
            authDomain: "my-secret-chat-b3918.firebaseapp.com",
            projectId: "my-secret-chat-b3918",
            storageBucket: "my-secret-chat-b3918.firebasestorage.app",
            messagingSenderId: "262274674368",
            appId: "1:262274674368:web:a2aae95ccd0bbab02ec725",
            databaseURL: "https://my-secret-chat-b3918-default-rtdb.firebaseio.com/"
        };

        // Firebase Initialize करणे
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const messagesRef = ref(database, 'chats');

        let currentUser = "";

        // लॉगिन चेक फंक्शन
        document.getElementById("login-btn").addEventListener("click", () => {
            const user = document.getElementById("username").value.trim();
            const pass = document.getElementById("password").value.trim();
            const sharedPassword = "Seeta2324"; // तुमचा मुख्य पासवर्ड

            if (user !== "" && pass === sharedPassword) {
                currentUser = user;
                document.getElementById("user-display").innerText = currentUser;
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("chat-room").style.display = "flex";
                loadMessages();
            } else {
                alert(" निघ पळ!");
            }
        });

        // मेसेज पाठवणे फंक्शन
        document.getElementById("send-btn").addEventListener("click", sendMessage);
        document.getElementById("msg-text").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });

        function sendMessage() {
            const msgInput = document.getElementById("msg-text");
            const msgText = msgInput.value.trim();
            if (msgText === "" || currentUser === "") return;

            const newMsgRef = push(messagesRef);
            set(newMsgRef, {
                sender: currentUser,
                text: msgText,
                timestamp: Date.now()
            });

            msgInput.value = "";
        }

        // डेटाबेसमधून मेसेज रिअल-टाइम लोड करणे
        function loadMessages() {
            const msgBox = document.getElementById("messages");
            
            onChildAdded(messagesRef, (data) => {
                const msgData = data.val();
                const msgElement = document.createElement("div");
                
                msgElement.classList.add("msg");
                if (msgData.sender === currentUser) {
                    msgElement.classList.add("me");
                    msgElement.innerText = msgData.text;
                } else {
                    msgElement.classList.add("other");
                    msgElement.innerHTML = `<div class="msg-sender">${msgData.sender}</div>${msgData.text}`;
                }
                
                msgBox.appendChild(msgElement);
                msgBox.scrollTop = msgBox.scrollHeight;
            });
        }
    </script>
</body>
</html>
